<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PVZ Garden — VOLCANO</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="pvz-frame">
  <div id="hud">
    <div id="sun-well" aria-live="polite">
      <div class="sun-well-inner">
        <span class="sun-icon" aria-hidden="true">☀</span>
        <span id="sun-count" class="sun-number">50</span>
      </div>
    </div>
    <div id="seed-trough">
      <div id="seed-bar"></div>
    </div>
    <div id="wave-display">
      <span class="wave-label">Wave</span>
      <span id="wave-num" class="wave-num">1</span>
    </div>
  </div>
  <div id="canvas-wrap">
    <canvas id="game" width="920" height="562" aria-label="Lawn"></canvas>
  </div>
  <div id="overlay" class="hidden">
    <div class="panel">
      <h2 id="overlay-title"></h2>
      <p id="overlay-msg"></p>
      <button type="button" id="btn-restart">Play Again</button>
    </div>
  </div>
  <section id="help" class="help" aria-label="How to play">
    <p id="hint">
      <strong>Play:</strong> Tap or click a seed packet, then an <em>empty</em> grass tile to plant.
      Tap suns to collect them. Survive every wave—zombies that reach the house end the run.
    </p>
  </section>
  </div>
  <script src="js/config.js"></script>
  <script src="js/entities.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
